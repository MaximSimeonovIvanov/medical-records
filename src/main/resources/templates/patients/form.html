<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Patient Form')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto">
        <h2 th:text="${id != null} ? 'Edit Patient' : 'Add Patient'"></h2>

        <div th:if="${error}" class="alert alert-danger"
             th:text="${error}"></div>

        <form th:action="${id != null
                ? '/patients/' + id + '/edit'
                : '/patients/new'}"
              method="post">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name"
                       class="form-control"
                       th:value="${patient?.name}" required>
            </div>

            <div class="form-group">
                <label>EGN</label>
                <input type="text" name="egn"
                       class="form-control"
                       th:value="${patient?.egn}"
                       placeholder="10 digits" required>
            </div>

            <div class="form-group">
                <label>General Practitioner</label>
                <select name="generalPractitionerId"
                        class="form-control" required>
                    <option value="">-- Select GP --</option>
                    <option th:each="gp : ${gps}"
                            th:value="${gp.id}"
                            th:text="${gp.name}"
                            th:selected="${patient?.generalPractitionerId == gp.id}">
                    </option>
                </select>
                <!--дропдаун с ГПта от контролер-->
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox"
                           name="healthInsured"
                           th:checked="${patient?.healthInsured}">
                    Health Insured
                </label>
            </div>

            <div style="display: flex; gap: 1rem">
                <button type="submit"
                        class="btn btn-primary">Save</button>
                <a th:href="@{/patients}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
