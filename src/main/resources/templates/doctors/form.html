<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Doctor Form')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto">
        <h2 th:text="${id != null} ? 'Edit Doctor' : 'Add Doctor'"></h2>

        <div th:if="${error}" class="alert alert-danger"
             th:text="${error}"></div>

        <form th:action="${id != null ? '/doctors/' + id + '/edit' : '/doctors/new'}"
              method="post">

            <div class="form-group">
                <label>UIN</label>
                <input type="text" name="uin" class="form-control"
                       th:value="${doctor?.uin}" required>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" class="form-control"
                       th:value="${doctor?.name}" required>
            </div>
            <div class="form-group">
                <label>Specialty</label>
                <input type="text" name="specialty" class="form-control"
                       th:value="${doctor?.specialty}" required>
            </div>

            <!-- Only show when creating new doctor -->
            <div th:if="${id == null}" class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                       class="form-control" required>
            </div>
            <div th:if="${id == null}" class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       class="form-control" required>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" name="gp"
                           th:checked="${doctor?.gp}">
                    General Practitioner (GP)
                </label>
            </div>

            <div style="display: flex; gap: 1rem">
                <button type="submit"
                        class="btn btn-primary">Save</button>
                <a th:href="@{/doctors}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
