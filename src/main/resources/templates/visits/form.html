<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Visit Form')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto">
        <h2 th:text="${id != null} ? 'Edit Visit' : 'Add Visit'"></h2>

        <div th:if="${error}" class="alert alert-danger"
             th:text="${error}"></div>

        <form th:action="${id != null
                ? '/visits/' + id + '/edit'
                : '/visits/new'}"
              method="post">

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date"
                       class="form-control"
                       required>
            </div>

            <div class="form-group">
                <label>Patient</label>
                <select name="patientId"
                        class="form-control" required>
                    <option value="">-- Select Patient --</option>
                    <option th:each="patient : ${patients}"
                            th:value="${patient.id}"
                            th:text="${patient.name}">
                    </option>
                </select>
            </div>

            <div class="form-group"
                 sec:authorize="hasRole('ADMIN')">
                <label>Doctor</label>
                <select name="doctorId"
                        class="form-control">
                    <option value="">-- Select Doctor --</option>
                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.id}"
                            th:text="${doctor.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Diagnosis</label>
                <select name="diagnosisId"
                        class="form-control" required>
                    <option value="">-- Select Diagnosis --</option>
                    <option th:each="diagnosis : ${diagnoses}"
                            th:value="${diagnosis.id}"
                            th:text="${diagnosis.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Treatment</label>
                <textarea name="treatment"
                          class="form-control"
                          rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Price (BGN)</label>
                <input type="number" name="price"
                       class="form-control"
                       step="0.01" min="0"
                       required>
            </div>

            <div style="display: flex; gap: 1rem">
                <button type="submit"
                        class="btn btn-primary">Save</button>
                <a th:href="@{/visits}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
