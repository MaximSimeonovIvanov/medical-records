<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body>

<div class="login-container">
    <div class="card">
        <h2>Medical Records</h2>
        <h3 style="margin-bottom: 1.5rem; color: #666">Sign In</h3>

        <!--error message-->
        <div th:if="${param.error}" class="alert alert-danger">
            Invalid username or password.
        </div>

        <!--logout message-->
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>

        <!--registration success m-->
        <div th:if="${param.registered}" class="alert alert-success">
            Registration successful! Please log in.
        </div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                       class="form-control"
                       placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       class="form-control"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary"
                    style="width: 100%">Login</button>
        </form>

        <p style="margin-top: 1rem; text-align: center">
            Don't have an account?
            <a th:href="@{/register}">Register as Patient</a>
        </p>
    </div>
</div>

</body>
</html>
