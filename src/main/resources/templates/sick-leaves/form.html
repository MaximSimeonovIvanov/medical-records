<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Sick Leave Form')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
  <div class="card" style="max-width: 600px; margin: 0 auto">
    <h2 th:text="${id != null} ? 'Edit Sick Leave' : 'Add Sick Leave'"></h2>

    <div th:if="${error}" class="alert alert-danger"
         th:text="${error}"></div>

    <form th:action="${id != null
                ? '/sick-leaves/' + id + '/edit'
                : '/sick-leaves/new'}"
          method="post">

      <div class="form-group">
        <label>Visit</label>
        <select name="visitId"
                class="form-control" required>
          <option value="">-- Select Visit --</option>
          <option th:each="visit : ${visits}"
                  th:value="${visit.id}"
                  th:text="${visit.date} + ' - ' +
                                     ${visit.patientName} + ' - ' +
                                     ${visit.diagnosisName}">
          </option>
        </select>
        <!--показва дата, пац., диагноза, за да може лекарят да идентифицира правилното посещ-->
      </div>

      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="startDate"
               class="form-control" required>
      </div>

      <div class="form-group">
        <label>Number of Days</label>
        <input type="number" name="numberOfDays"
               class="form-control"
               min="1" required>
      </div>

      <div style="display: flex; gap: 1rem">
        <button type="submit"
                class="btn btn-primary">Save</button>
        <a th:href="@{/sick-leaves}"
           class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
